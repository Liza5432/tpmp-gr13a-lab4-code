name: C Project Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build project
        working-directory: ./project
        run: make

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: green_app
          path: project/bin/green_app

      - name: Build with Coverage
        run: |
          gcc -Iproject/includes project/src/database.c project/src/tests.c -o test_runner -lsqlite3 -fprofile-arcs -ftest-coverage
      
      - name: Run Tests
        run: ./test_runner

      - name: Generate Coverage Report
        run: |
          gcov project/src/database.c
          
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./database.c.gcov
          fail_ci_if_error: true
